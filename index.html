<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Customer Recommender</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; }
        .plot { text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        input[type="number"] { width: 200px; padding: 5px; }
        .recommendations { margin-top: 30px; }
        .product { display: inline-block; margin: 10px; text-align: center; }
        .product img { width: 150px; height: auto; border: 1px solid #ccc; padding: 5px; }
    </style>
</head>
<body>
    <h1>Customer Segmentation & Product Recommendation</h1>
    
    <div class="plot">
        <h3>Customer Clusters (K-Means)</h3>
        <img src="data:image/png;base64,{{ plot_img }}" alt="Cluster plot" />
    </div>
    
    <div class="input-form">
        <h3>Enter Customer Details</h3>
        <form method="POST">
            <div class="form-group">
                <label for="income">Annual Income:</label>
                <input type="number" name="income" id="income" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="score">Spending Score (1–100):</label>
                <input type="number" name="score" id="score" step="0.01" min="0" max="100" required>
            </div>
            <button type="submit">Get Recommendation</button>
        </form>
    </div>
    
    {% if recommended %}
    <div class="recommendations">
        <h3>Recommended Products (for your cluster):</h3>
        {% for prod, img in zip(recommended, images) %}
            <div class="product">
                <img src="{{ img }}" alt="{{ prod }}">
                <div>{{ prod }}</div>
            </div>
        {% endfor %}
    </div>
    {% endif %}
</body>
</html>
